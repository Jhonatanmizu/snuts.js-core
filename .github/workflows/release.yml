name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'ci: version packages')"
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check pending changesets
        id: changesets
        run: |
          if yarn changeset status >/dev/null 2>&1; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: yarn version-packages

      - name: Commit and push version bump
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          if git diff --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "ci: version packages [skip ci]"
          git push

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'true'
        run: yarn release
